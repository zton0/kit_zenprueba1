<title>Poke Equipo</title>
<link rel="icon" type="image/png" href="logokit.png">
<style>
    body{
        background-color: #150014;
        background-image: url('pokefondo.jpg');  
        background-size: cover;
        background-repeat: no-repeat;
        background-attachment: fixed;
        font-family: Arial, sans-serif;
        color: white;
        text-align: center;
    }
    .container-box{
        width:730px;
        margin:auto;
        padding:15px;
        border-radius:10px;
        border:4px solid #000;
    }
    .grid{
        display:grid;
        grid-template-columns: repeat(6, 100px);
        grid-gap:8px;
        justify-content:center;
        min-height:350px;
    }
    .slot{
        width:100px;
        height:120px;
        border:2px solid #000;
        border-radius:6px;
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        padding:3px;
    }
    .slot img{
        width:85%;
        height:85%;
        object-fit:contain;
    }
    .poke-name{
        font-size:12px;
        margin-top:3px;
        font-weight:bold;
    }
    .btn-arrow{
        font-size:35px;
        cursor:pointer;
        user-select:none;
        padding:5px 15px;
    }
    .top-controls{
        display:flex;
        justify-content:space-between;
        margin:10px 0;
        font-size:28px;
        font-weight:bold;
    }
    .green{ background:#98e296; }
    .red{ background:#f5a2a2; }
    .blue{ background:#7bb6ff; }
</style>
</head>

let currentBox = 0;

function loadBox(){
    document.getElementById("boxName").innerText = boxTitles[currentBox];

    let grid = document.getElementById("boxGrid");
    grid.innerHTML = "";

    let container = document.getElementById("boxContainer");
    container.classList.remove("green","red","blue");

    if(currentBox === 0){
        container.classList.add("green");
    } else if(currentBox >= 1 && currentBox <= 3){
        container.classList.add("red");
    } else {
        container.classList.add("blue");
    }

    let slots = currentBox === 0 ? 6 : 30;

    for(let i=0;i<slots;i++){
        let div = document.createElement("div");
        div.className = "slot";

        let img = document.createElement("img");
        img.src = boxes[currentBox][i];
        div.appendChild(img);

        let label = document.createElement("div");
        label.className = "poke-name";
        label.innerText = names[currentBox][i];
        div.appendChild(label);

        grid.appendChild(div);
    }
}

function prevBox(){ currentBox = (currentBox-1+boxes.length)%boxes.length; loadBox(); }
function nextBox(){ currentBox = (currentBox+1)%boxes.length; loadBox(); }

loadBox();
